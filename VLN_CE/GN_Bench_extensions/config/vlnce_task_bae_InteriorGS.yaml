ENVIRONMENT:
  MAX_EPISODE_STEPS: 500
  ITERATOR_OPTIONS:
    SHUFFLE: true
    GROUP_BY_SCENE: false
SIMULATOR:
  ACTION_SPACE_CONFIG: v0
  AGENT_0:
    SENSORS: [RGB_SENSOR]
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 15
  RGB_SENSOR:
    WIDTH: 480
    HEIGHT: 360
    HFOV: 70
    TYPE: GNBenchSimRGBSensor
  COLLIDABLE: true

TASK:
  TYPE: VLN-v0
  SUCCESS_DISTANCE: 3.0
  SENSORS: [INSTRUCTION_SENSOR]
  INSTRUCTION_SENSOR_UUID: instruction
  POSSIBLE_ACTIONS: [STOP, MOVE_FORWARD, TURN_LEFT, TURN_RIGHT]
  MEASUREMENTS: [
    DISTANCE_TO_GOAL,
    SUCCESS,
    SPL,
    PATH_LENGTH,
    ORACLE_SUCCESS,
    STEPS_TAKEN
  ]
  SUCCESS:
    SUCCESS_DISTANCE: 3.0
  SPL:
    SUCCESS_DISTANCE: 3.0
  ORACLE_SUCCESS:
    SUCCESS_DISTANCE: 3.0


DATASET:
  TYPE: GN_Matrix
  DATA_PATH: data/datasets/GN_Matrix/InteriorGS_episode
  DATASET_CONFIG: data/datasets/GN_Matrix/splits/interiorGS_seen.json
  SCENES_DIR: data/scene_datasets/InteriorGS
